[pytest]
# Minimum pytest version required
minversion = 8.0

# Command-line options added automatically on every run
addopts = 
    -ra
    --strict-markers
    --durations=5
    --suppress-no-test-exit-code

# Directories where pytest will look for tests
testpaths =
    tests

# Register custom test markers to prevent typos (e.g., @pytest.mark.slow)
markers =
    slow: Marks tests as slow (deselect with '-m "not slow"')
    integration: Marks integration tests requiring external services
    unit: Marks fast-running unit tests

# Ignore specific warnings or suppress noisy third-party warnings
filterwarnings =
    ignore::DeprecationWarning